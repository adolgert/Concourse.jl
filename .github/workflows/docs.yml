name: Documentation

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install docs dependencies
        # ClockGradients.jl is unregistered, and Concourse and QueueDiagrams
        # are developed from the checkout, so the docs Manifest is built here
        # rather than committed.
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.add(url = "https://github.com/adolgert/CompetingClocks.jl")
            Pkg.add(url = "https://github.com/adolgert/ClockGradients.jl")
            Pkg.develop([
                PackageSpec(path = pwd()),
                PackageSpec(path = joinpath(pwd(), "docs", "QueueDiagrams")),
            ])
            Pkg.instantiate()'
      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs docs/make.jl
